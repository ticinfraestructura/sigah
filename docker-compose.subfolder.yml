# SIGAH - Docker Compose para Subfolder /sigah
# Arquitectura: dominio.com/sigah → contenedores SIGAH

version: '3.8'

services:
  # ============================================
  # Nginx Proxy Maestro (con subfolder /sigah)
  # ============================================
  nginx-proxy:
    image: nginx:alpine
    container_name: sigah-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"     # HTTP
      - "443:443"   # HTTPS
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/subfolder.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - sigah-network
      - tomcat-network
    depends_on:
      - sigah-backend
      - sigah-frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # SIGAH Backend API
  # ============================================
  sigah-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: sigah-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sigah:${DB_PASSWORD}@sigah-db:5432/sigah
      REDIS_URL: redis://sigah-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://dominio.com,https://dominio.com}
      TZ: America/Bogota
      # Importante: API sin prefijo para que Nginx lo maneje
      API_BASE_PATH: /
    volumes:
      - backend_logs:/app/logs
      - uploads_data:/app/uploads
    networks:
      - sigah-network
    depends_on:
      sigah-db:
        condition: service_healthy
      sigah-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ============================================
  # SIGAH Frontend (React + Nginx)
  # ============================================
  sigah-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /sigah-api  # Importante: API con prefijo /sigah-api
        VITE_BASE_PATH: /sigah/    # Base path para routing
        REACT_APP_API_URL: /sigah-api
    container_name: sigah-frontend
    restart: unless-stopped
    environment:
      TZ: America/Bogota
    networks:
      - sigah-network
    depends_on:
      sigah-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ============================================
  # PostgreSQL (Base de Datos SIGAH)
  # ============================================
  sigah-db:
    image: postgres:16-alpine
    container_name: sigah-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sigah
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sigah
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: America/Bogota
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - sigah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigah -d sigah -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ============================================
  # Redis (Cache y Sesiones)
  # ============================================
  sigah-redis:
    image: redis:7-alpine
    container_name: sigah-redis
    restart: unless-stopped
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
      - redis_conf:/usr/local/etc/redis
    networks:
      - sigah-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

  # ============================================
  # Tomcat Existente (Conexión via Red Docker)
  # ============================================
  tomcat-connector:
    image: alpine:latest
    container_name: tomcat-connector
    restart: "no"
    networks:
      - tomcat-network
    command: ["tail", "-f", "/dev/null"]

# ============================================
# Redes Docker
# ============================================
networks:
  sigah-network:
    name: sigah-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: sigah-br0

  tomcat-network:
    name: tomcat-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
    driver_opts:
      com.docker.network.bridge.name: tomcat-br0

# ============================================
# Volúmenes Persistentes
# ============================================
volumes:
  postgres_data:
    name: sigah-postgres-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/data/postgres

  postgres_backups:
    name: sigah-postgres-backups
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/backups/postgres

  redis_data:
    name: sigah-redis-data
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/data/redis

  redis_conf:
    name: sigah-redis-config
    driver: local

  backend_logs:
    name: sigah-backend-logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/logs/backend

  nginx_logs:
    name: sigah-nginx-logs
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/logs/nginx

  uploads_data:
    name: sigah-uploads
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/sigah/data/uploads
