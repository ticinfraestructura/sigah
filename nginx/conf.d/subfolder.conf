# Nginx Configuration - Subfolder Architecture
# Una IP, un dominio, ruta /sigah para nueva app

# ============================================
# DOMINIO PRINCIPAL CON SUBFOLDER /SIGAH
# ============================================
server {
    listen 80;
    server_name dominio.com www.dominio.com;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # ============================================
    # HEALTH CHECKS
    # ============================================
    location /health {
        access_log off;
        return 200 "Nginx Proxy OK\n";
        add_header Content-Type text/plain;
    }

    location /health/tomcat {
        access_log off;
        proxy_pass http://tomcat_backend/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /health/sigah {
        access_log off;
        proxy_pass http://sigah_backend/api/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # ============================================
    # RUTA /SIGAH - NUEVA APLICACIÓN SIGAH
    # ============================================
    
    # API de SIGAH en /sigah/api/
    location /sigah/api/ {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        
        # Importante: remover /sigah del path antes de pasar al backend
        rewrite ^/sigah/api/(.*)$ /api/$1 break;
        
        proxy_pass http://sigah_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400 always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        # API specific settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # Login específico con rate limiting
    location /sigah/api/auth/login {
        limit_req zone=login burst=5 nodelay;
        
        rewrite ^/sigah/api/(.*)$ /api/$1 break;
        proxy_pass http://sigah_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SIGAH en /sigah/
    location /sigah/ {
        # Importante: mantener /sigah/ para el frontend
        proxy_pass http://sigah_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # SPA support - manejar rutas de React Router
        # Si no es un archivo estático, pasar al index.html
        location ~ ^/sigah/(?!(api|static|assets|images|css|js)) {
            proxy_pass http://sigah_frontend/index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://sigah_frontend;
        }
    }

    # ============================================
    # APLICACIÓN TOMCAT EXISTENTE (RESTO DE RUTAS)
    # ============================================
    
    # Importante: esta debe ir después de /sigah para que tenga prioridad
    location / {
        proxy_pass http://tomcat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Mantener sesiones de Tomcat
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";
        proxy_cookie_domain ~.* $host;
        
        # Timeouts para compatibilidad con Tomcat
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Retry settings
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
        proxy_next_upstream_timeout 30s;
    }
}

# ============================================
# CONFIGURACIÓN SSL/TLS - DOMINIO PRINCIPAL
# ============================================
server {
    listen 443 ssl http2;
    server_name dominio.com www.dominio.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/dominio.com.crt;
    ssl_certificate_key /etc/nginx/ssl/dominio.com.key;
    
    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # Health checks
    location /health {
        access_log off;
        return 200 "Nginx HTTPS Proxy OK\n";
        add_header Content-Type text/plain;
    }

    location /health/tomcat {
        access_log off;
        proxy_pass http://tomcat_backend/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    location /health/sigah {
        access_log off;
        proxy_pass http://sigah_backend/api/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }

    # SIGAH API en HTTPS
    location /sigah/api/ {
        limit_req zone=api burst=20 nodelay;
        
        rewrite ^/sigah/api/(.*)$ /api/$1 break;
        proxy_pass http://sigah_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Max-Age 86400 always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    location /sigah/api/auth/login {
        limit_req zone=login burst=5 nodelay;
        
        rewrite ^/sigah/api/(.*)$ /api/$1 break;
        proxy_pass http://sigah_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SIGAH Frontend en HTTPS
    location /sigah/ {
        proxy_pass http://sigah_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # SPA support
        location ~ ^/sigah/(?!(api|static|assets|images|css|js)) {
            proxy_pass http://sigah_frontend/index.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://sigah_frontend;
        }
    }

    # Aplicación Tomcat existente
    location / {
        proxy_pass http://tomcat_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";
        proxy_cookie_domain ~.* $host;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# ============================================
# REDIRECCIÓN HTTP A HTTPS
# ============================================
server {
    listen 80;
    server_name dominio.com www.dominio.com;
    return 301 https://$server_name$request_uri;
}
