# Nginx Nuevo - Proxy Maestro Total
# NO TOCA la infraestructura existente, solo dirige el tráfico

# Upstream para aplicación Tomcat existente (sin modificar)
upstream tomcat_existente {
    server 127.0.0.1:8080;  # Puerto actual de Tomcat - NO CAMBIAR
    keepalive 32;
}

# Upstream para backend SIGAH
upstream sigah_backend {
    server 127.0.0.1:3001;  # Backend SIGAH
    keepalive 32;
}

# Upstream para frontend SIGAH
upstream sigah_frontend {
    server 127.0.0.1:8080;  # Frontend SIGAH en su propio contenedor
    keepalive 32;
}

# Servidor principal - Maneja TODO el tráfico
server {
    listen 80;
    server_name tu-dominio.com;  # Tu dominio principal
    
    # Logging específico para debugging
    access_log /var/log/nginx/master-access.log;
    error_log /var/log/nginx/master-error.log;

    # === REDIRECCIÓN APLICACIÓN TOMCAT EXISTENTE ===
    # Mantener exactamente la misma estructura de URLs que usa actualmente
    location / {
        proxy_pass http://tomcat_existente;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Mantener sesiones de Tomcat
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";
        
        # Timeouts para compatibilidad con Tomcat
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # === NUEVA APLICACIÓN SIGAH ===
    # API de SIGAH
    location /sigah-api/ {
        proxy_pass http://sigah_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # CORS para API
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Frontend SIGAH
    location /sigah/ {
        proxy_pass http://sigah_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Para React Router (SPA)
        try_files $uri $uri/ /sigah/index.html;
    }

    # === HEALTH CHECKS ===
    location /health/master {
        access_log off;
        return 200 "Nginx Master Proxy OK\n";
        add_header Content-Type text/plain;
    }

    location /health/tomcat {
        proxy_pass http://tomcat_existente/health;  # Ajustar al health check real de Tomcat
        access_log off;
    }

    location /health/sigah {
        proxy_pass http://sigah_backend/api/health;
        access_log off;
    }
}

# Configuración SSL (opcional pero recomendado)
server {
    listen 443 ssl http2;
    server_name tu-dominio.com;
    
    # Certificados SSL
    ssl_certificate /etc/nginx/ssl/tu-certificado.crt;
    ssl_certificate_key /etc/nginx/ssl/tu-privada.key;
    
    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Mismas reglas que HTTP
    location / {
        proxy_pass http://tomcat_existente;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_path / "/; HttpOnly; SameSite=Lax";
    }

    location /sigah-api/ {
        proxy_pass http://sigah_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        add_header Access-Control-Allow-Credentials true always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location /sigah/ {
        proxy_pass http://sigah_frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        try_files $uri $uri/ /sigah/index.html;
    }
}

# Redirección HTTP a HTTPS
server {
    listen 80;
    server_name tu-dominio.com;
    return 301 https://$server_name$request_uri;
}
