# SIGAH - Docker Compose para producción local
# Arquitectura: https://localhost/sigah
# version: '3.8'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: sigah-nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/subfolder.local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - sigah-network
      - tomcat-network
    depends_on:
      - sigah-backend
      - sigah-frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  sigah-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    container_name: sigah-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://sigah:${DB_PASSWORD}@sigah-db:5432/sigah
      REDIS_URL: redis://sigah-redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,https://localhost}
      TZ: America/Bogota
      API_BASE_PATH: /
    volumes:
      - ./logs/backend:/app/logs
      - ./data/uploads:/app/uploads
    networks:
      - sigah-network
    depends_on:
      sigah-db:
        condition: service_healthy
      sigah-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  sigah-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /sigah/api
        VITE_BASE_PATH: /sigah/
        REACT_APP_API_URL: /sigah/api
    container_name: sigah-frontend
    restart: unless-stopped
    environment:
      TZ: America/Bogota
    networks:
      - sigah-network
    depends_on:
      sigah-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  sigah-db:
    image: postgres:16-alpine
    container_name: sigah-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sigah
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: sigah
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      TZ: America/Bogota
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    networks:
      - sigah-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigah -d sigah -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  sigah-redis:
    image: redis:7-alpine
    container_name: sigah-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - ./data/redis:/data
    networks:
      - sigah-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

  tomcat-connector:
    image: alpine:latest
    container_name: tomcat-connector
    restart: "no"
    networks:
      - tomcat-network
    command: ["tail", "-f", "/dev/null"]

networks:
  sigah-network:
    name: sigah-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: sigah-br0

  tomcat-network:
    name: tomcat-network
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
          gateway: 172.21.0.1
    driver_opts:
      com.docker.network.bridge.name: tomcat-br0
