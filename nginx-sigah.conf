# Configuración Nginx para convivir Tomcat + SIGAH
# Agregar este bloque al nginx.conf existente

upstream tomcat_backend {
    server localhost:8080; # Puerto Tomcat existente
}

upstream sigah_backend {
    server localhost:3001; # Backend SIGAH
}

# Servidor principal
server {
    listen 80;
    server_name tu-dominio.com;

    # Aplicación existente en Tomcat
    location /app-antigua/ {
        proxy_pass http://tomcat_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API de SIGAH
    location /api/ {
        proxy_pass http://sigah_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend SIGAH (servido por su propio Nginx)
    location /sigah/ {
        proxy_pass http://localhost:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Página principal (puede redirigir a una de las apps)
    location = / {
        # Opción 1: Redirigir a SIGAH
        # return 301 /sigah/;
        
        # Opción 2: Página de selección
        # try_files /index.html =404;
    }
}
